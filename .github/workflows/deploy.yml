name: Deploy EN

# WIP: пока ТОЛЬКО ручной запуск (Actions → Deploy EN → Run workflow).
# Когда новый дизайн будет готов к публикации — раскомментируй блок `push`,
# чтобы деплой шёл автоматически на каждый пуш в master.
on:
  # push:
  #   branches:
  #     - master
  workflow_dispatch:

jobs:
  deploy-en:
    name: Deploy EN → motka-rix.erra.net
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: webflow-export/
          remote_path: /var/www/motka-rix.erra.net/
          remote_host: 213.21.222.128
          remote_user: motka
          remote_key: ${{ secrets.DEPLOY_KEY }}
