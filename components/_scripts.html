<!--
  _scripts.html — скрипты в конце <body> для основных страниц
  Вставлять непосредственно перед </body>

  Включает:
  - jQuery 3.5.1 + Webflow JS (нужны для Webflow-анимаций на HTTrack-страницах)
  - Dropdown polyfill (nav-дропдауны вне Webflow-хостинга)
  - Header scroll-peek behaviour
  - Динамический год в футере (.this-year)

  ⚠ Для новых страниц, собранных без Webflow-взаимодействий,
    блоки jQuery и Webflow-чанков можно убрать.

  Для /portfolio/ страниц пути к Webflow-чанкам такие же (CDN, не локальные).
-->

<!-- jQuery + Webflow JS (HTTrack-страницы) -->
<script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c88953.js?site=623a4d65378e3dda4dd20f87" type="text/javascript"></script>
<script src="https://cdn.prod.website-files.com/623a4d65378e3dda4dd20f87/js/webflow.schunk.1a807f015b216e46.js" type="text/javascript"></script>
<script src="https://cdn.prod.website-files.com/623a4d65378e3dda4dd20f87/js/webflow.schunk.bc4682c1acbd769d.js" type="text/javascript"></script>
<script src="https://cdn.prod.website-files.com/623a4d65378e3dda4dd20f87/js/webflow.600839c5.134caefc20243375.js" type="text/javascript"></script>

<!-- Dropdown polyfill (nav dropdowns вне Webflow-хостинга) -->
<script>
(function(){
  function open(dd){
    dd.classList.add('w--open');
    var t=dd.querySelector('.w-dropdown-toggle');
    var l=dd.querySelector('.w-dropdown-list');
    if(t) t.classList.add('w--open');
    if(l) l.classList.add('w--open');
  }
  function close(dd){
    dd.classList.remove('w--open');
    var t=dd.querySelector('.w-dropdown-toggle');
    var l=dd.querySelector('.w-dropdown-list');
    if(t) t.classList.remove('w--open');
    if(l) l.classList.remove('w--open');
  }
  function closeAll(){
    document.querySelectorAll('.w-dropdown.w--open').forEach(close);
  }
  function init(){
    document.querySelectorAll('.w-dropdown').forEach(function(dd){
      var toggle=dd.querySelector('.w-dropdown-toggle');
      if(!toggle) return;
      var isHover=dd.getAttribute('data-hover')==='true';
      if(isHover){
        dd.addEventListener('mouseenter',function(){ open(dd); });
        dd.addEventListener('mouseleave',function(){ close(dd); });
      } else {
        toggle.addEventListener('click',function(e){
          e.stopPropagation();
          var wasOpen=dd.classList.contains('w--open');
          closeAll();
          if(!wasOpen) open(dd);
        });
      }
    });
    document.addEventListener('click', closeAll);
  }
  document.readyState==='loading'
    ? document.addEventListener('DOMContentLoaded',init)
    : init();
})();
</script>

<!-- Header scroll-peek -->
<script>
(function(){
  var h = document.querySelector('.mtk-header');
  if (!h) return;
  var ly = 0;
  window.addEventListener('scroll', function(){
    var y = window.scrollY;
    if (y <= 0) { h.classList.remove('is-peek'); }
    else if (y < ly) { h.classList.add('is-peek'); }
    else { h.classList.remove('is-peek'); }
    ly = y;
  }, { passive: true });
})();
</script>

<!-- Динамический год в футере -->
<script>
document.querySelectorAll('.this-year').forEach(function(el){
  el.textContent = new Date().getFullYear();
});
</script>
