name: Deploy preview to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; новые пуши отменяют предыдущий незавершённый
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Astro
        run: npm run build

      # Подмешиваем старые webflow-страницы (about/contacts/portfolio/cases/...),
      # НЕ перезаписывая вывод Astro (новая главная index.html и subscription.html остаются).
      - name: Merge legacy webflow pages
        run: cp -rn webflow-export/. dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
